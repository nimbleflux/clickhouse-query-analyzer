services:
  minio:
    image: minio/minio:latest
    ports:
      - "19001:9000"
      - "19002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ch-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ch-net
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing myminio/clickhouse-data &&
      echo 'Bucket created successfully'
      "

  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:latest
    ports:
      - "19181:9181"
    volumes:
      - keeper-data:/var/lib/clickhouse-keeper
      - ./keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml
    networks:
      - ch-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    hostname: clickhouse
    depends_on:
      clickhouse-keeper:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DB: system
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config.xml:/etc/clickhouse-server/config.d/analyzer.xml
      - ./users.xml:/etc/clickhouse-server/users.d/analyzer.xml
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ch-net

  clickhouse-2:
    image: clickhouse/clickhouse-server:latest
    hostname: clickhouse-2
    depends_on:
      clickhouse-keeper:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_DB: system
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-2-data:/var/lib/clickhouse
      - ./config.xml:/etc/clickhouse-server/config.d/analyzer.xml
      - ./users.xml:/etc/clickhouse-server/users.d/analyzer.xml
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ch-net

networks:
  ch-net:

volumes:
  clickhouse-data:
  clickhouse-2-data:
  minio-data:
  keeper-data:
