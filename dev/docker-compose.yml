services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DB: system
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config.xml:/etc/clickhouse-server/config.d/analyzer.xml
      - ./users.xml:/etc/clickhouse-server/users.d/analyzer.xml
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
