name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: Lint frontend
        run: cd web && npx tsc --noEmit

      - name: Go fmt check
        run: test -z "$(gofmt -l .)"

      - name: Go mod tidy check
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Go unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./internal/...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: NPM audit
        run: cd web && npm audit --audit-level=high || true

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Start ClickHouse
        run: cd dev && docker compose up -d clickhouse

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 60); do
            if docker exec dev-clickhouse-1 clickhouse-client --query "SELECT 1" >/dev/null 2>&1; then
              echo "ClickHouse is ready"
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse did not become ready"
          exit 1

      - name: Seed data
        run: |
          for attempt in 1 2 3; do
            echo "Seed attempt $attempt..."
            if docker exec -i dev-clickhouse-1 clickhouse-client < dev/seed-ci.sql; then
              echo "Seed succeeded"
              exit 0
            fi
            echo "Seed failed, waiting 5s..."
            sleep 5
          done
          echo "Seed failed after 3 attempts"
          exit 1

      - name: Flush logs
        run: |
          for attempt in 1 2 3; do
            echo "Flush attempt $attempt..."
            if docker exec dev-clickhouse-1 clickhouse-client --query "SYSTEM FLUSH LOGS" --receive_timeout 30; then
              echo "Flush succeeded"
              exit 0
            fi
            echo "Flush failed, waiting 5s..."
            sleep 5
          done
          echo "Flush failed after 3 attempts (non-fatal)"
          exit 0

      - name: Run integration tests
        run: go test -race -count=1 -tags=integration -v ./tests/integration/...
        env:
          CLICKHOUSE_URL: clickhouse://localhost:19000

      - name: Stop ClickHouse
        if: always()
        run: cd dev && docker compose down -v

  build:
    needs: [lint, unit-test, vulncheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: Build frontend
        run: cd web && npm run build

      - name: Embed frontend
        run: |
          mkdir -p cmd/server/frontend
          cp -r web/dist/* cmd/server/frontend/

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o clickhouse-query-analyzer ./cmd/server

      - name: Print version
        run: |
          ./clickhouse-query-analyzer --help 2>&1 || true
          echo "Version: ${{ steps.version.outputs.version }}"

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/setup-qemu-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
